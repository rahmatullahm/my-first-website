<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding-top: 100px;
        }

        h1{
            color: darkblue;
        }

        p{
            font-size: 20px;
        }

        button{
            padding: 10px 20px;
            font-size: 18px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div id="clock"; style="font-size: xx-large;"">Loading...</div>
    <h1>Hello World</h1>
    
    <p>This is my first web page uploaded to GitHub.</p>
    <p>Welcome to my Web</p>
    <p style="color: crimson; font-size: xxx-large;">ولاکه چی پښتو به کار وکی که یا</p>
    <img src="1.jpg" style="width:300px; border: 10px solid black;">
    <hr>
    <button onclick="showMessage()">
        Click Me
    </button>
    <script>
        function showMessage(){
            alert("Welcome to my website!");
        }
    </script>
    <script>
        function updateClock() {
            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // add zero if single digit
            if (hours < 10) hours = "0" + hours;
            if (minutes < 10) minutes = "0" + minutes;
            if (seconds < 10) seconds = "0" + seconds;

            document.getElementById("clock").innerText =
                hours + ":" + minutes + ":" + seconds;
        }

        // update every 1 second
        setInterval(updateClock, 1000);

        // run immediately
        updateClock();
</script>

</body>
</html>
